<!DOCTYPE html>
<html>
<head>
  <title>Simple To-Do List</title>
  <style>
    body {
      font-family: Arial;
      background: purple;
      text-align: center;
      margin-top: 50px;
    }
    .box {
      background:lavender;
      width: 500px;
      margin: auto;
      padding: 50px;
      border-radius: 20px;
    }
    input {
      padding: 10px;
      width: 40%;
    }
    button {
      padding: 8px;
      margin: 2px;
    }
    li {
      list-style: none;
      background:white;
      margin: 5px;
      padding:10px;
    }
    .done {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>To-Do List</h2>
    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>
    <br><br>
    <button onclick="showTasks('all')">All</button>
    <button onclick="showTasks('completed')">Completed</button>
    <button onclick="showTasks('pending')">Pending</button>

    <ul id="taskList"></ul>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }
    function addTask() {
      let input = document.getElementById("taskInput");

      if (input.value == "") {
        alert("Enter a task");
        return;
      }
      tasks.push({
        text: input.value,
        completed: false
      });
      saveTasks();
      showTasks();
      input.value = "";
    }
    function showTasks(filter = "all") {
      let list = document.getElementById("taskList");
      list.innerHTML = "";

      tasks.forEach((task, index) => {
        if (filter == "completed" && !task.completed) return;
        if (filter == "pending" && task.completed) return;
        let li = document.createElement("li");
        li.innerHTML = `
          <span class="${task.completed ? 'done' : ''}">
            ${task.text}
          </span>
          <br><br>
          <button onclick="completeTask(${index})">Done</button>
          <button onclick="editTask(${index})">Edit</button>
          <button onclick="deleteTask(${index})">Delete</button>
        `;
        list.appendChild(li);
      });
    }
    function completeTask(index) {
      tasks[index].completed = !tasks[index].completed;
      saveTasks();
      showTasks();
    }
    function editTask(index) {
      let newTask = prompt("Edit task", tasks[index].text);
      if (newTask != null && newTask != "") {
        tasks[index].text = newTask;
        saveTasks();
        showTasks();
      }
    }
    function deleteTask(index) {
      tasks.splice(index, 1);
      saveTasks();
      showTasks();
    }
    showTasks();
  </script>
</body>
</html>
